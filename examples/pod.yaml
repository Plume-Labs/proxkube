apiVersion: proxkube/v1
kind: Pod
metadata:
  name: my-web-server
  namespace: default
  labels:
    app: nginx
    env: production
spec:
  node: pve
  # Use Proxmox 9 OCI image (alternatively use osTemplate for classic LXC templates)
  image: docker.io/library/nginx:latest
  hostname: my-web-server
  unprivileged: true
  startOnBoot: true
  nameserver: "8.8.8.8"
  # Expose the pod externally with port forwarding
  expose: true
  ports:
    - hostPort: 8080
      containerPort: 80
      protocol: tcp
  # Multi-network support
  networks:
    - name: frontend
      bridge: vmbr0
      ip: dhcp
  # Tags visible in Proxmox dashboard (proxkube tag is auto-added)
  tags:
    - web
    - production
  # Assign to a Proxmox resource pool
  pool: web-servers
  # Description shown in the Proxmox dashboard notes panel
  description: "NGINX web server managed by proxkube"
  resources:
    cpu: 2
    memory: 512
    swap: 256
    disk: 8
    storage: local-lvm
  # Additional storage mount points
  mountPoints:
    - storage: local-lvm
      size: 10
      mountPath: /mnt/data
      backup: true
